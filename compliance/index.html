<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>qbitOS Compliance</title>
  <meta name="description" content="qbitOS canonical compliance lane" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: radial-gradient(1000px 600px at 15% -20%, #284674, #0b1220 52%, #050810);
      color: #dbeafe;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(980px, 100%);
      border: 1px solid #2e4566;
      border-radius: 16px;
      background: rgba(12, 20, 33, 0.86);
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.4);
      padding: 20px 18px 16px;
    }
    h1 { margin: 8px 0 10px; font-size: clamp(24px, 4vw, 36px); letter-spacing: .04em; }
    p { margin: 0 0 10px; color: #b6cde6; line-height: 1.55; font-size: 13px; }
    code {
      background: #101a2a;
      border: 1px solid #2d4668;
      color: #d2e7ff;
      border-radius: 8px;
      padding: 2px 8px;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    a.chip {
      text-decoration: none;
      color: #e2efff;
      border: 1px solid #2f7bdb66;
      background: rgba(47, 123, 219, 0.24);
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: .04em;
      padding: 5px 11px;
      white-space: nowrap;
    }
    a.chip:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card" aria-label="qbitOS compliance lane">
    <h1>qbitOS Compliance</h1>
    <p>Canonical compliance root for qbitOS and ugrad.ai runtime governance.</p>
    <p><code>DAC -&gt; Iron Line -&gt; Prefixes -&gt; Quantum Gutter -&gt; .qbit -&gt; preflight</code></p>
    <div class="chips">
      <a class="chip" href="https://github.com/qbitOS/compliance">Canonical Repository</a>
      <a class="chip" href="https://github.com/qbitOS/compliance/blob/main/compliance/evidence/latest/compliance-scoreboard.qjson">Org Scoreboard</a>
      <a class="chip" href="https://github.com/qbitOS/compliance/blob/main/compliance/evidence/latest/compliance-scoreboard-core-runtime.qjson">Core Runtime Scoreboard</a>
      <a class="chip" href="https://github.com/orgs/qbitOS/repositories">Organization Repositories</a>
    </div>
  </main>
</body>
</html>
